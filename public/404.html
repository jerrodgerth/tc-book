<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Thoroughness and Charm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif&display=swap');
        body {
            font-family: 'Noto Serif', serif;
            background-color: transparent;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .section-box {
            padding: 40px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            flex: 1;
        }
        .btn-primary {
            background-color: #876d5c;
            border-color: #876d5c;
        }
        .btn-primary:hover {
            background-color: #7a6251;
            border-color: #7a6251;
        }
        .btn-primary:focus, .btn-primary.focus {
            box-shadow: 0 0 0 0.25rem rgba(135, 109, 92, 0.5);
        }
        .error-code {
            font-size: 6rem;
            color: #876d5c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center text-center py-5 section-box">
            <div class="col-md-8">
                <div class="error-code">404</div>
                <h1 class="display-4">Page Not Found</h1>
                <p class="lead">We couldn't find the page you were looking for.</p>
                <p>It might have been moved, deleted, or perhaps the URL was mistyped. Let us help you get back on track.</p>
                <a href="/" class="btn btn-primary btn-lg mt-3">Return Home</a>
            </div>
        </div>
    </div>
    <footer class="bg-dark text-light text-center py-3">
        <div class="container">
            <p>&copy; 2026 Mandi Gerth. All rights reserved.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
